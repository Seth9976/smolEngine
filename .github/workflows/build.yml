name: Build smolEngine & smolEditor (Windows)  
  
on:  
  push:  
    branches: [ main, master ]  
  pull_request:  
    branches: [ main, master ]  
  workflow_dispatch:  
  
jobs:  
  windows:  
    name: windows (Release)  
    runs-on: windows-2022  
  
    env:  
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"  
      X_VCPKG_REGISTRIES_CACHE: ${{ github.workspace }}/vcpkg_registries_cache  
  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
        with:  
          submodules: recursive  
  
      # x-gha 二进制缓存需要这两个环境变量，必须显式导出  
      - name: Export GitHub Actions cache environment variables  
        uses: actions/github-script@v7  
        with:  
          script: |  
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');  
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');  
  
      - name: Setup MSBuild  
        uses: microsoft/setup-msbuild@v2  
  
      # 缓存 vcpkg registry 元数据，避免每次重新拉取  
      - name: Cache vcpkg registries  
        uses: actions/cache@v4  
        with:  
          path: ${{ github.workspace }}/vcpkg_registries_cache  
          key: vcpkg-registries-win64-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}  
          restore-keys: vcpkg-registries-win64-  
  
      # vcpkg 无预编译 exe，必须从源码 bootstrap  
      - name: Bootstrap vcpkg  
        shell: cmd  
        run: call vcpkg\bootstrap-vcpkg.bat -disableMetrics  
  
      # 包体二进制由 x-gha 缓存，命中时跳过编译  
      - name: Install vcpkg dependencies  
        shell: cmd  
        run: vcpkg\vcpkg.exe install opengl glew glm devil[libjpeg,libpng] assimp sdl2 imgui[opengl3-binding,sdl2-binding,docking-experimental] --recurse --triplet x64-windows  
  
      - name: Build solution (Release|x64)  
        shell: cmd  
        run: msbuild smolGameMaker.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal  
  
      - name: Collect artifacts  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path artifact | Out-Null  
          Copy-Item "x64\Release\smolEditor.exe" artifact\ -ErrorAction Stop  
          Get-ChildItem "x64\Release\*.dll" | Copy-Item -Destination artifact\  
          if (Test-Path "smolEditor\Assets") { Copy-Item "smolEditor\Assets" "artifact\Assets" -Recurse }  
          Get-ChildItem artifact -Recurse | Select-Object FullName  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: smolEditor-win64-release  
          path: artifact/  
          if-no-files-found: error  
  
      - name: Create GitHub Release  
        if: startsWith(github.ref, 'refs/tags/')  
        uses: softprops/action-gh-release@v2  
        with:  
          files: artifact/**
